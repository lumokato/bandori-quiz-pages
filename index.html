  }
  return `attempt-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
}

function buildResultPayload(sortedResults) {
  const bestMatch = sortedResults[0] || null;
  const topThree = sortedResults.slice(0, 3);

  return {
    attemptId: currentAttemptId,
    quizVersion,
    totalQuestions: quizData.length,
    answers: userAnswers,
    bestMatch,
    topThree,
    scores: scoreParams,
    submittedAt: new Date().toISOString(),
    pagePath: window.location.pathname,
    pageUrl: window.location.href,
    userAgent: navigator.userAgent
  };
}

async function submitResult(payload) {
  try {
    await fetch(saveEndpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload),
      keepalive: true
    });
  } catch (error) {
    console.warn("Result save skipped:", error);
  }
}

// 计算每个角色参数的最大可能得分（新增函数）
function calculateMaxScores() {
  const maxScores = {};
  // 初始化所有参数的最大分值为0
  Object.keys(scoreParams).forEach(key => {
    maxScores[key] = 0;
  });
  
  // 遍历每道题，找到每个参数在该题中的最大可能得分
  quizData.forEach(quiz => {
    quiz.options.forEach(option => {
      const scores = option.scores;
      Object.keys(scores).forEach(key => {
        // 比较当前最大值和该选项分值，取更大的那个
        if (scores[key] > maxScores[key]) {
          maxScores[key] = scores[key];
        }
      });
    });
  });
  
  // 累加每道题的最大分值，得到全局最大值
  const totalMaxScores = {};
  Object.keys(maxScores).forEach(key => {
    totalMaxScores[key] = 0;
  });
  
  quizData.forEach(quiz => {
    // 对每道题，找到每个参数的最大可能得分并累加
    Object.keys(totalMaxScores).forEach(key => {
      let questionMax = -Infinity;
      quiz.options.forEach(option => {
        if (option.scores[key] > questionMax) {
          questionMax = option.scores[key];
        }
      });
      totalMaxScores[key] += questionMax;
    });
  });
  
  return totalMaxScores;
}

// 5. 加载题目和选项
function loadQuestion(index) {
  const quiz = quizData[index];
  document.getElementById('question').textContent = quiz.question;
  
  const optionsContainer = document.getElementById('options');
  optionsContainer.innerHTML = '';
  
  // 生成选项按钮
  quiz.options.forEach((option, optIndex) => {
    const optionBtn = document.createElement('button');
    optionBtn.className = 'option-btn';
    // 标记已选选项（优化选中样式）
    if (userAnswers[index] === optIndex) {
      optionBtn.classList.add('selected');
    }
    optionBtn.textContent = option.text;
    
    // 选项点击事件（核心：计分逻辑+样式优化）
    optionBtn.addEventListener('click', function() {
      // 清除当前题所有选项的选中样式
      const allOptions = document.querySelectorAll('.option-btn');
      allOptions.forEach(btn => btn.classList.remove('selected'));
      // 标记当前选项为选中
      this.classList.add('selected');
      
      // 1. 如果这道题之前选过，先撤销之前的分数变动
      if (userAnswers[index] !== undefined) {
        const prevOption = quiz.options[userAnswers[index]];
        undoScore(prevOption.scores); // 撤销旧分数
      }
      
      // 2. 记录当前选择，更新分数
      userAnswers[index] = optIndex;
      addScore(option.scores); // 新增当前选项的分数
      
      // 3. 跳转到下一题或显示结果
      if (index < quizData.length - 1) {
        currentQuestionIndex++;
        loadQuestion(currentQuestionIndex);
        updateProgress();
        updateBackBtnStatus();
      } else {
        // 所有题目答完，显示结果
        showResult();
      }
    });
    optionsContainer.appendChild(optionBtn);
  });
}

// 6. 分数操作函数
// 加分函数（根据选项规则更新参数）
function addScore(scoreRule) {
  if (!scoreRule) return; // 增加边界判断，避免undefined
  for (const key in scoreRule) {
    scoreParams[key] += scoreRule[key];
  }
}

// 撤销分数函数（用于回退/重新选择）
function undoScore(scoreRule) {
  if (!scoreRule) return; // 增加边界判断，避免undefined
  for (const key in scoreRule) {
    scoreParams[key] -= scoreRule[key];
  }
}

// 7. 进度条和回退按钮更新
function updateProgress() {
  const progress = ((currentQuestionIndex + 1) / quizData.length) * 100;
  document.getElementById('progress-bar').style.width = `${progress}%`;
  document.getElementById('progress-text').textContent = `${currentQuestionIndex + 1}/${quizData.length}`;
}

function updateBackBtnStatus() {
  const backBtn = document.getElementById('back-btn');
  if (currentQuestionIndex === 0) {
    backBtn.disabled = true;
    backBtn.style.display = 'none';
  } else {
    backBtn.disabled = false;
    backBtn.style.display = 'block';
  }
}

// 8. 回退按钮逻辑（优化：增加边界判断）
document.getElementById('back-btn').addEventListener('click', function() {
  if (currentQuestionIndex > 0) {
    // 1. 撤销当前题的分数（仅当选过选项时）
    if (userAnswers[currentQuestionIndex] !== undefined) {
      const currentQuiz = quizData[currentQuestionIndex];
      const selectedOption = currentQuiz.options[userAnswers[currentQuestionIndex]];
      undoScore(selectedOption.scores); // 撤销分数
      userAnswers[currentQuestionIndex] = undefined; // 清空当前题答案
    }
    
    // 2. 回退到上一题
    currentQuestionIndex--;
    loadQuestion(currentQuestionIndex);
    updateProgress();
    updateBackBtnStatus();
  }
});

// 9. 显示结果（新增：百分比计算 + 最大/最小三个显示）
// 显示结果（新版：开关控制 + 只显示角色名+百分比）
function showResult() {
  // 计算每个角色理论最高总分
  const maxScores = calculateMaxScores();

    const max = maxScores[key] || 1;

      name: characterMap[key] || key,

    };

  // 开关1：显示全部角色（默认关闭）

  const sw1 = createSwitch("显示全部角色分数", false, (checked) => {
    resultList.style.display = checked ? "flex" : "none";
  
    // 控制「显示全部角色寄语」开关的显示/隐藏
    if (checked) {
      // 生成「显示全部角色寄语」开关（仅首次生成）
      if (!document.getElementById("quote-switch")) {
        const quoteSw = createSwitch("显示全部角色寄语", false, (quoteChecked) => {
          // 刷新全角色列表的显示（根据是否勾选寄语切换）
          renderFullCharacterList(sorted, quoteChecked);
        });
        quoteSw.id = "quote-switch";
        switchWrap.appendChild(quoteSw);
      }
    } else {
      // 隐藏寄语开关
      const quoteSw = document.getElementById("quote-switch");
      if (quoteSw) quoteSw.remove();
    }
  });

  // 开关2：显示百分比（默认关闭）
  const sw2 = createSwitch("显示角色匹配度", false, (checked) => {
    document.querySelectorAll(".extreme-item .pct").forEach(el => {
      el.style.display = checked ? "block" : "none";
    });
  });

  switchWrap.append(sw1, sw2);
  resultPage.insertBefore(switchWrap, resultList);

  // ==========================================
  // 最高3 + 最低3 卡片
  const boxContainer = document.createElement("div");
  boxContainer.id = "extremes-boxes";
  boxContainer.style.display = "flex";
  boxContainer.style.flexWrap = "wrap";
  boxContainer.style.gap = "0.8rem";
  boxContainer.style.justifyContent = "center";
  boxContainer.style.marginBottom = "2rem";

  // 最相似标题
  const topTitle = document.createElement("div");
  topTitle.style.fontSize = "1.1rem";
  topTitle.style.fontWeight = "600";
  topTitle.style.marginBottom = "1rem";
  topTitle.style.width = "100%";
  topTitle.textContent = "与你最相似的角色是：";
  boxContainer.appendChild(topTitle);

  top3.forEach(item => boxContainer.appendChild(createCard(item, "top")));

  // 中间加大间隔
  const spacer = document.createElement("div");
  spacer.style.width = "100%";
  spacer.style.height = "3rem"; // 间隔大小，可改
  boxContainer.appendChild(spacer);

  // 最不相似标题
  const bottomTitle = document.createElement("div");
  bottomTitle.style.fontSize = "1.1rem";
  bottomTitle.style.fontWeight = "600";
  bottomTitle.style.marginBottom = "1rem";
  bottomTitle.style.width = "100%";
  bottomTitle.textContent = "与你最不相似的角色是：";
  boxContainer.appendChild(bottomTitle);

  bottom3.forEach(item => boxContainer.appendChild(createCard(item, "bottom")));
  resultPage.insertBefore(boxContainer, resultList);

  // ==========================================
  // 渲染全角色列表（默认隐藏）
  // ==============================================
  // 初始化渲染全角色列表（默认隐藏，不显示寄语）
  renderFullCharacterList(sorted, false);

  document.querySelectorAll('.qa-box')?.forEach(el => el.remove());// 先清除旧的 QA

  const qaBox = document.createElement("div");
  qaBox.className = "qa-box"; //用于识别删除
  qaBox.style.marginTop = "2.5rem";
  qaBox.style.marginBottom = "2.5rem";
  qaBox.style.textAlign = "left";
  qaBox.style.fontSize = "12px";
  qaBox.style.fontWeight = "normal";
  qaBox.style.color = "#475569";
  qaBox.style.lineHeight = "1.6";
  qaBox.style.padding = "0 0.2rem";

  qaBox.innerHTML = `
    <div style="margin-bottom: 0.3rem; display: flex; gap: 0.5rem; align-items: flex-start;">
      <span style="font-weight:600; color:#334155; white-space: nowrap;">Q1：</span>
      <span>这个测试是怎样计算角色的匹配度的？</span>
    </div>
    <div style="margin-bottom: 0.9rem; display: flex; gap: 0.5rem; align-items: flex-start;">
      <span style="font-weight:600; color:#334155; white-space: nowrap;">A1：</span>
      <span>本测试为每一个角色设置了独立的参数，且不与选项绑定，每一个选项都会为角色累计不同的分值，最后累加计算得到匹配度。</span>
    </div>

    <div style="margin-bottom: 0.3rem; display: flex; gap: 0.5rem; align-items: flex-start;">
      <span style="font-weight:600; color:#334155; white-space: nowrap;">Q2：</span>
      <span>为什么显示3个相似/不相似角色，而不是1个？</span>
    </div>
    <div style="margin-bottom: 0.9rem; display: flex; gap: 0.5rem; align-items: flex-start;">
      <span style="font-weight:600; color:#334155; white-space: nowrap;">A2：</span>
      <span>由于题目数量有限，官方角色设定中存在比较相似的角色，且作者对角色的理解存在不足，测试中会出现数位角色相似度相近的情况，此时如果只显示1个角色会显得不够全面。</span>
    </div>

    <div style="margin-bottom: 0.3rem; display: flex; gap: 0.5rem; align-items: flex-start;">
      <span style="font-weight:600; color:#334155; white-space: nowrap;">Q3：</span>
      <span>后续还会继续更新吗？</span>
    </div>
    <div style="display: flex; gap: 0.5rem; align-items: flex-start;">
      <span style="font-weight:600; color:#334155; white-space: nowrap;">A3：</span>
      <span>会的，后续会持续优化题目以及界面显示；对于性格转变较大的角色，也计划将其“早期”状态区分开来；对于新角色和目前塑造仍不完全的角色，后续会随官方剧情进展进行更新。</span>
    </div>
  `;

  // 把 QA 加到页面里（最不相似3个框的正下方）
  document.getElementById("extremes-boxes").after(qaBox);

  resultList.style.display = "none";

  // 切换到结果页
  document.getElementById("quiz-page").style.display = "none";
  document.getElementById("result-page").style.display = "block";
  submitResult(buildResultPayload(sorted));
}

// 生成开关
function createSwitch(label, checked, onChange) {
  const wrap = document.createElement("label");
  wrap.style.display = "flex";
  wrap.style.alignItems = "center";
  wrap.style.gap = "0.4rem";
  wrap.style.fontSize = "0.9rem";
  wrap.className = "result-switch";

  const input = document.createElement("input");
  input.type = "checkbox";
  input.checked = checked;
  input.addEventListener("change", () => onChange(input.checked));

  const text = document.createElement("span");
  text.textContent = label;
  wrap.append(input, text);
  return wrap;
}

// 生成卡片
function createCard(item, type) {
  const card = document.createElement("div");
  card.className = "extreme-item";
  // 增大高度、内边距
  card.style.padding = "1.4rem 1.2rem";
  card.style.borderRadius = "10px";
  card.style.minWidth = "150px";
  card.style.textAlign = "center";
  card.style.background = type === "top" ? "#eff6ff" : "#fef2f2";
  card.style.border = "1px solid " + (type === "top" ? "#3b82f6" : "#ef4444");

  // 加大名字字体 + 下方占位文字
  card.innerHTML = `
    <div style="font-weight:600; font-size: 1.2rem;">${item.name}</div>
    <div style="margin-top:0.4rem; font-size:0.9rem; color:#555;">${characterDesc[item.key] || "在此输入文字"}</div>
    <div class="pct" style="margin-top:0.3rem; display:none; color:#666;">
      ${item.percentage}%
    </div>
  `;
  return card;
}
// 渲染全角色列表（支持显示/隐藏寄语）
function renderFullCharacterList(sortedArray, showQuotes) {
  const resultList = document.getElementById("result-list");
  resultList.innerHTML = ""; // 清空旧列表
  
  sortedArray.forEach(item => {
    const div = document.createElement("div");
    div.className = "result-item";
    
    // 拼接内容：加粗名字 + 可选寄语 + 百分比（对齐样式）
    let content = `<span style="font-weight: 600;">${item.name}</span>`;
    if (showQuotes) {
      // 寄语缩进对齐（用 &nbsp; 保证间距一致）
      content += `<span style="margin: 0 8px; color: #64748b;">&nbsp;&nbsp;${characterQuotes[item.key] || ""}</span>`;
    }
    content += `<span style="color: #3b82f6; font-weight: 600;">${item.percentage}%</span>`;
    
    div.innerHTML = content;
    resultList.appendChild(div);
  });
}
